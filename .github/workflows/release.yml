name: Release

on:
  push:
    tags:
      - v[0-9]+.*

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: taiki-e/create-gh-release-action@v1
        with:
          changelog: CHANGELOG.md
          allow-missing-changelog: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-local-feature:
    strategy:
      matrix:
        include:
          - os: macos-latest
            cmake_install: brew install cmake
          - os: ubuntu-latest
            cmake_install: sudo apt-get install -y cmake
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install cmake (required by llama-cpp-2 build script)
        run: ${{ matrix.cmake_install }}
      - name: cargo check --features local
        run: cargo check --features local

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      # Cross-compile Linux aarch64 from an x86_64 ubuntu runner
      - name: Install cross-compilation tools
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
        if: startsWith(matrix.os, 'ubuntu')

      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: foxmayn-cowork
          target: ${{ matrix.target }}
          # Archive pattern mirrors the ffc convention: foxmayn-cowork_v0.1.0_x86_64-unknown-linux-gnu.tar.gz
          archive: foxmayn-cowork_$tag_$target
          checksum: sha256
          include: README.md
          tar: unix
          zip: windows
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
